<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>划词助手 - 配置</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    -webkit-app-region: drag;
  }
  .container {
    width: 400px;
    padding: 36px 32px;
    -webkit-app-region: no-drag;
  }
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header .icon {
    font-size: 40px;
    margin-bottom: 8px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 600;
    color: #ffffff;
  }
  .header p {
    font-size: 13px;
    color: #888;
    margin-top: 6px;
  }
  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    font-size: 13px;
    color: #aaa;
    margin-bottom: 8px;
    font-weight: 500;
  }
  .input-wrapper {
    display: flex;
    gap: 8px;
  }
  .input-wrapper input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #3a3a5c;
    border-radius: 8px;
    background: #16162b;
    color: #e0e0e0;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-wrapper input:focus {
    border-color: #6c63ff;
  }
  .input-wrapper input::placeholder {
    color: #555;
  }
  .btn {
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-primary {
    background: #6c63ff;
    color: #fff;
  }
  .btn-primary:hover {
    background: #5a52e0;
  }
  .btn-secondary {
    background: #2a2a4a;
    color: #ccc;
  }
  .btn-secondary:hover {
    background: #33335a;
  }
  .btn-full {
    width: 100%;
    padding: 12px;
    font-size: 15px;
  }
  .status {
    font-size: 12px;
    margin-top: 8px;
    min-height: 18px;
  }
  .status.success { color: #4caf50; }
  .status.error { color: #f44336; }
  .status.info { color: #ff9800; }
  .note {
    margin-top: 24px;
    padding: 14px;
    background: #16162b;
    border-radius: 8px;
    font-size: 12px;
    color: #888;
    line-height: 1.7;
  }
  .note a {
    color: #6c63ff;
    text-decoration: none;
  }
  .note a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="icon">✨</div>
    <h1>划词助手</h1>
    <p>基于 DeepSeek 的智能划词翻译与解释工具</p>
  </div>
  <div class="form-group">
    <label>DeepSeek API Key</label>
    <div class="input-wrapper">
      <input type="password" id="apiKey" placeholder="sk-xxxxxxxxxxxxxxxx" autofocus>
      <button class="btn btn-secondary" id="btnToggle" title="显示/隐藏">👁</button>
    </div>
    <div class="status" id="status"></div>
  </div>
  <button class="btn btn-primary btn-full" id="btnSave">保存并启动</button>
  <div class="note">
    获取 API Key：<a href="#" id="linkGetKey">platform.deepseek.com/api_keys</a><br>
    划词后自动弹出工具栏，支持翻译和解释功能。<br>
    翻译使用标准模式，解释使用深度思考模式。
  </div>
</div>

<script src="config.js"></script>
</body>
</html>
